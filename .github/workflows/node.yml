name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ release, main ]

permissions: {}

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v7
    - name: Verify npm all runs and build output matches
      uses: actions/setup-node@v6
      with:
        node-version: '20'
    - run: npm ci
    - run: npm run all
